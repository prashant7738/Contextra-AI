services:
  - type: web
    name: contextra-backend
    env: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: PYTHON_VERSION
        value: "3.12.0"
      # Supabase Storage (optional — leave empty to keep direct upload)
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: documents
      # Embedding provider: "local" | "openai" | "huggingface"
      - key: EMBEDDING_PROVIDER
        value: huggingface
      - key: OPENAI_API_KEY
        sync: false